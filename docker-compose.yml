version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tutor_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: huyhoang_tutor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutor_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/huyhoang_tutor?schema=public"
      JWT_SECRET: "huyhoang_tutor_secret_key_2026"
      JWT_EXPIRES_IN: "7d"
    depends_on:
      - db
    command: sh -c "npx prisma db push && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutor_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
